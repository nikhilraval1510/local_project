name: Build and Push Docker Image

on:
  push:
    branches: [ "master" ]

jobs:
  assemble:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # New Step 2: Securely log into Docker Hub using our vault keys
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # New Step 3: Extract metadata, tags, and prepare the image paths
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # New Step 4: Build AND push the compiled container to Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: guchuu2115/my-first-app:latest
