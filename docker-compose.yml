version: '3.8'

services:
  # CONTAINER 1: Your custom Node.js web application
  web:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - database

  # CONTAINER 2: The official PostgreSQL Enterprise Database
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: enterprise_data
    ports:
      - "5432:5432"
